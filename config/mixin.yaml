port: 7890
socks-port: 7891

external-controller: "127.0.0.1:9090"
external-ui: dist
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
secret:

allow-lan: false # 若开启务必设置用户验证以防暴露公网后被滥用
authentication:
  # - "username:password" # 用户验证（clashon 会自动填充）

# prefix：前置插入
# suffix：后置插入
# override：根据 name 匹配并替换原项
# inject：向指定 proxy-group 的 proxies 列表注入节点，仅适用于 proxy-groups
rules:
  prefix:
    - DOMAIN,api64.ipify.org,DIRECT # 用于 clashui 获取真实公网 IP
    # - DOMAIN-KEYWORD,github,proxy   # 用于 clashupgrade 升级内核
  suffix:

proxies:
  prefix:
  suffix:
  override:

proxy-groups:
  prefix:
  suffix:
  override:
  inject:

# Tun 配置仅在 INIT_TYPE=systemd 且显式执行 clashtun on 时生效。
tun:
  enable: false
  stack: system
  auto-route: true
  auto-redir: true # clash
  auto-redirect: true # mihomo
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  route-exclude-address:
    - 1.1.1.1/32 # 用于 clashui 获取真实公网 IP
  exclude-src-port:
    # - 80

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  nameserver:
    - 114.114.114.114
    - 8.8.8.8
